services:
  - type: web
    name: snapfeed-api
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_PROJECT_ID
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_TIMEOUT_MS
        value: "300000"
      - key: PRODUCT_BG_REMOVAL_ENABLED
        value: "false"
      - key: PRODUCT_BG_REMOVAL_BACKEND
        value: replicate
      - key: PRODUCT_BG_REMOVAL_MODEL
        value: small
      - key: IMAGE_UPSCALE_ENABLED
        value: "false"
      - key: IMAGE_UPSCALE_FACTOR
        value: "2"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=460"
